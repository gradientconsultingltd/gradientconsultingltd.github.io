name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Prerendering only re-runs when this workflow runs — scraping new jobs
  # in the separate gradient-jobs-pipeline repo doesn't trigger it, so the
  # static pages Google reads would otherwise silently drift out of sync
  # with the live data. This keeps that gap to at most a day.
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build frontend
        run: pnpm build:client
        env:
          VITE_BASE_PATH: /
      - name: Install Playwright's Chromium (for prerendering)
        run: npx playwright install --with-deps chromium
      - name: Prerender every job/company page to static HTML
        run: node scripts/prerender.mjs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
